{{ $JMR_DIRECTORY := .Env.JMR_DIRECTORY | default "/data" -}}

jitsi-multitrack-recorder {
  recording {
    {{- if .Env.JMR_FORMAT }}
    format = {{ .Env.JMR_FORMAT }}
    {{- end }}
    directory = {{ $JMR_DIRECTORY }}
  }
  {{- if .Env.JMR_FINALIZE_SCRIPT }}
  finalize-script = "{{ .Env.JMR_FINALIZE_SCRIPT }}"
  {{- end }}
  live-forward {
    {{- if .Env.JMR_LIVE_FORWARD_ENABLED }}
    enabled = {{ .Env.JMR_LIVE_FORWARD_ENABLED }}
    {{- end }}
    {{- if .Env.JMR_LIVE_FORWARD_URL }}
    url = "{{ .Env.JMR_LIVE_FORWARD_URL }}"
    {{- end }}
    {{- if .Env.JMR_LIVE_FORWARD_AUTH_TOKEN }}
    auth-token = "{{ .Env.JMR_LIVE_FORWARD_AUTH_TOKEN }}"
    {{- end }}
    {{- if .Env.JMR_RECORDING_ENABLED }}
    recording-enabled = {{ .Env.JMR_RECORDING_ENABLED }}
    {{- end }}
    {{- if .Env.JMR_LIVE_FORWARD_FAIL_ON_ERROR }}
    fail-on-forward-error = {{ .Env.JMR_LIVE_FORWARD_FAIL_ON_ERROR }}
    {{- end }}
    {{- if .Env.JMR_LIVE_FORWARD_MAX_QUEUE_SIZE }}
    max-queue-size = {{ .Env.JMR_LIVE_FORWARD_MAX_QUEUE_SIZE }}
    {{- end }}
  }
}
